<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CPM</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .disabled {
      background: #334155;
      color: #94a3b8;
      cursor: not-allowed;
    }

    .active {
      background: #22c55e;
      color: white;
    }

    .active:hover {
      background: #16a34a;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      resize: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>CPM</h1>

    <!-- Opciones -->
    <button class="btn disabled">CPM1 (Próximamente)</button>
    <button class="btn active" onclick="mostrarFormulario()">CPM2</button>

    <!-- Formulario -->
    <form id="form" class="hidden" action="https://formsubmit.co/cesaralbertolandero@gmail.com" method="POST">
      <textarea name="mensaje" placeholder="Escribe algo..." required></textarea>
      <button class="btn active" type="submit">Aceptar</button>
    </form>

  </div>

  <script>
    function mostrarFormulario() {
      document.getElementById("form").classList.remove("hidden");
    }
  </script>

</body>
</html>
