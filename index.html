<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SEC HAX INJECTION</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: monospace;
      color: #00ff9f;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px #00ff9f;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 20px;
      min-height: 25px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 100%;
      cursor: pointer;
      background: #00ff9f;
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00cc7a;
    }

    .disabled {
      background: #022c22;
      color: #0f766e;
      cursor: not-allowed;
    }

    input, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: black;
      color: #00ff9f;
    }

    textarea {
      height: 80px;
      resize: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="card">
  <h1 id="title"></h1>

  <button class="btn disabled">CPM1 (PRÓXIMAMENTE)</button>
  <button class="btn" onclick="mostrarFormulario()">CPM2</button>

  <form id="form" class="hidden" action="https://formsubmit.co/cesaralbertolandero@gmail.com" method="POST">
    <input type="text" name="campo1" placeholder="Primer dato..." required>
    <textarea name="campo2" placeholder="Segundo dato..." required></textarea>
    <button class="btn" type="submit">ACEPTAR</button>
  </form>
</div>

<script>
  // Texto animado tipo máquina
  const text = "SEC HAX INJECTION";
  let i = 0;
  function escribir() {
    if (i < text.length) {
      document.getElementById("title").innerHTML += text.charAt(i);
      i++;
      setTimeout(escribir, 80);
    }
  }
  escribir();

  function mostrarFormulario() {
    document.getElementById("form").classList.remove("hidden");
  }

  // Efecto Matrix
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letras = "01";
  const fontSize = 14;
  const columnas = canvas.width / fontSize;

  const drops = [];
  for (let x = 0; x < columnas; x++) {
    drops[x] = 1;
  }

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letras.charAt(Math.floor(Math.random() * letras.length));
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }

      drops[i]++;
    }
  }

  setInterval(draw, 35);
</script>

</body>
</html>
